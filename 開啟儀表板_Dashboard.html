<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=http://127.0.0.1:8000/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開啟 AppleInc 儀表板</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
        }
        h1 { 
            font-size: 1.5rem; 
            margin-bottom: 0.5rem; 
            font-weight: 600;
        }
        p { 
            color: #86868b; 
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .loader {
            border: 4px solid #f2f2f7;
            border-top: 4px solid #0071e3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            display: inline-block;
            background-color: #0071e3;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 113, 227, 0.3);
        }
        a:hover {
            background-color: #0077ed;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0, 113, 227, 0.4);
        }
        .hint {
            font-size: 0.85rem; 
            margin-top: 2rem; 
            margin-bottom: 0;
            color: #86868b;
            padding-top: 1rem;
            border-top: 1px solid #e5e5ea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AppleInc 儀表板</h1>
        <p>正在為您導向至本機監控系統...</p>
        <div class="loader"></div>
        <p style="font-size: 0.95rem;">如果沒有跳轉，您可以手動點擊下方按鈕</p>
        <a href="http://127.0.0.1:8000/">立即前往 (127.0.0.1:8000)</a>
        <p class="hint">⚠️ 請確保您的本機伺服器 (web/server.py) 已在執行中</p>
    </div>
    <script>
        // 確保立即跳轉
        setTimeout(function() {
            window.location.href = "http://127.0.0.1:8000/";
        }, 500);
    </script>
</body>
</html>
